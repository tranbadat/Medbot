<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedBot — Doctor Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 300px; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 20px 16px; border-bottom: 1px solid #2a2a4e; }
  .sidebar-header h2 { font-size: 18px; color: #60a5fa; }
  .sidebar-header .doctor-info { font-size: 13px; color: #94a3b8; margin-top: 4px; }
  .status-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; }
  .status-dot.busy { background: #f59e0b; }
  .status-dot.offline { background: #6b7280; }
  select.status-select { background: #2a2a4e; color: #fff; border: 1px solid #3a3a5e; border-radius: 6px; padding: 4px 8px; font-size: 13px; cursor: pointer; }
  .cases-list { flex: 1; overflow-y: auto; padding: 8px; }
  .case-item { padding: 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; background: #2a2a4e; transition: background .15s; }
  .case-item:hover, .case-item.active { background: #3b3b6e; }
  .case-item .case-id { font-size: 11px; color: #60a5fa; font-family: monospace; }
  .case-item .case-user { font-weight: 600; font-size: 14px; margin-top: 2px; }
  .case-item .case-meta { font-size: 12px; color: #94a3b8; margin-top: 3px; }
  .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-high { background: #fca5a5; color: #7f1d1d; }
  .badge-medium { background: #fde68a; color: #78350f; }
  .badge-low { background: #bbf7d0; color: #14532d; }
  .badge-pending { background: #dbeafe; color: #1e3a8a; }
  .badge-active { background: #dcfce7; color: #14532d; }

  /* Main panel — overflow:hidden + min-height:0 required for nested flex scroll */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .top-bar { flex-shrink: 0; background: #fff; padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h3 { font-size: 16px; }
  .top-bar .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  button.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-ghost { background: transparent; color: #64748b; border: 1px solid #cbd5e1; }
  .btn-ghost:hover { background: #f1f5f9; }

  /* Chat panel — must be flex column with min-height:0 so chat-area can scroll */
  #chatPanel { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

  /* Chat area — flex:1 + min-height:0 + overflow-y:auto = scrollable */
  .chat-area { flex: 1; min-height: 0; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 70%; display: flex; flex-direction: column; }
  .msg.user { align-self: flex-start; }
  .msg.doctor, .msg.bot { align-self: flex-end; }
  .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
  .msg.user .msg-bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
  .msg.bot .msg-bubble { background: #dbeafe; color: #1e3a8a; border-bottom-right-radius: 4px; }
  .msg.doctor .msg-bubble { background: #dcfce7; color: #14532d; border-bottom-right-radius: 4px; }
  .msg-meta { font-size: 11px; color: #94a3b8; margin-top: 3px; }
  .msg.user .msg-meta { text-align: left; }
  .msg.doctor .msg-meta, .msg.bot .msg-meta { text-align: right; }

  /* Input area — flex-shrink:0 keeps it pinned at bottom */
  .input-area { flex-shrink: 0; background: #fff; padding: 12px 24px 16px; border-top: 1px solid #e2e8f0; }
  .quick-replies { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .qr-btn { padding: 5px 10px; border-radius: 16px; border: 1px solid #cbd5e1; background: #f8fafc; color: #475569; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .qr-btn:hover { background: #e0f2fe; border-color: #7dd3fc; color: #0369a1; }
  .qr-btn.bot { border-color: #6366f1; color: #4f46e5; background: #eef2ff; }
  .qr-btn.bot:hover { background: #c7d2fe; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea.msg-input { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 10px; resize: none; font-size: 14px; font-family: inherit; max-height: 120px; min-height: 44px; }
  textarea.msg-input:focus { outline: none; border-color: #3b82f6; }

  /* Login overlay */
  .login-overlay { position: fixed; inset: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 100; }
  .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
  .login-card h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 6px; }
  .login-card p { color: #64748b; margin-bottom: 28px; font-size: 14px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #374151; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #3b82f6; }
  .login-error { color: #ef4444; font-size: 13px; margin-top: -10px; margin-bottom: 14px; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; gap: 12px; }
  .empty-state svg { opacity: .4; }

  .notification { position: fixed; top: 20px; right: 20px; background: #1a1a2e; color: #fff; padding: 12px 18px; border-radius: 10px; font-size: 14px; z-index: 999; animation: slideIn .3s ease; max-width: 320px; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <h1>🏥 MedBot Dashboard</h1>
    <p>Đăng nhập để bắt đầu nhận ca tư vấn</p>
    <div class="form-group">
      <label>Tên đăng nhập</label>
      <input id="loginUsername" type="text" placeholder="doctor1" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div id="loginError" class="login-error" style="display:none"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<div class="app" id="mainApp" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>🏥 MedBot</h2>
      <div class="doctor-info" id="doctorInfo">—</div>
      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <select class="status-select" id="statusSelect" onchange="updateStatus(this.value)">
          <option value="online">Online</option>
          <option value="busy">Bận</option>
          <option value="offline">Offline</option>
        </select>
        <button onclick="doLogout()" style="margin-left:auto;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:13px;padding:2px 6px" title="Đăng xuất">⏻</button>
      </div>
    </div>
    <div style="display:flex;gap:0;border-bottom:1px solid #e2e8f0">
      <button id="tabCases" onclick="switchTab('cases')" style="flex:1;padding:8px 4px;font-size:12px;border:none;background:#3b82f6;color:#fff;cursor:pointer">💬 Ca tư vấn</button>
      <button id="tabAppts" onclick="switchTab('appts')" style="flex:1;padding:8px 4px;font-size:12px;border:none;background:#f8fafc;color:#64748b;cursor:pointer">📅 Lịch hẹn</button>
    </div>
    <div id="panelCases">
      <div class="cases-list" id="casesList">
        <div style="padding:16px;font-size:13px;color:#475569">Chưa có ca nào...</div>
      </div>
    </div>
    <div id="panelAppts" style="display:none;overflow-y:auto;flex:1">
      <div style="padding:12px">
        <button class="btn btn-primary" style="width:100%;margin-bottom:10px;font-size:12px" onclick="loadAppointments()">🔄 Tải lại</button>
        <div id="apptList" style="font-size:13px;color:#475569">Đang tải...</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div id="emptyMain" class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      <p>Chọn một ca để bắt đầu tư vấn</p>
    </div>

    <div id="chatPanel" style="display:none">
      <div class="top-bar">
        <div>
          <h3 id="chatTitle">Bệnh nhân</h3>
          <div style="font-size:12px;color:#64748b;margin-top:2px" id="chatMeta">—</div>
        </div>
        <div class="actions">
          <button class="btn btn-success" id="btnAccept" onclick="acceptCase()" style="display:none">✅ Nhận ca</button>
          <button class="btn btn-ghost" onclick="transferCase()">↔ Chuyển ca</button>
          <button class="btn btn-danger" onclick="closeCase()">✖ Kết thúc ca</button>
        </div>
      </div>
      <div class="chat-area" id="chatArea"></div>
      <div class="input-area">
        <div class="quick-replies" id="quickReplies">
          <button class="qr-btn bot" onclick="delegateToBot()" title="Để AI trả lời tin nhắn cuối của bệnh nhân">🤖 Giao Bot trả lời</button>
          <button class="qr-btn" onclick="qrFill('Giờ làm việc của phòng khám: Thứ 2–6: 07:30–20:00, Thứ 7: 07:30–17:00, CN: 08:00–12:00. Cấp cứu 24/7 gọi 115.')">🕐 Giờ làm việc</button>
          <button class="qr-btn" onclick="qrFill('Để đặt lịch khám, bạn có thể nhắn &quot;đặt lịch&quot; để dùng trợ lý tự động, hoặc gọi (028) 3823 xxxx.')">📅 Cách đặt lịch</button>
          <button class="qr-btn" onclick="qrFill('Phòng khám ở Số 1 Đường Đại Cồ Việt, HN. Có thể đi xe bus, taxi hoặc đặt xe công nghệ. Bãi giữ xe miễn phí cho bệnh nhân.')">📍 Địa chỉ & đường đi</button>
          <button class="qr-btn" onclick="qrFill('Vui lòng mang theo CMND/CCCD, thẻ BHYT (nếu có) và đến trước 15 phút để làm thủ tục. Nếu có xét nghiệm máu sáng, nhịn ăn 8 tiếng trước.')">📋 Chuẩn bị trước khám</button>
          <button class="qr-btn" onclick="qrFill('Phí khám tổng quát: 150.000–300.000 VNĐ. Khám chuyên khoa: 200.000–500.000 VNĐ. Xét nghiệm cơ bản: 100.000–300.000 VNĐ. Liên hệ để biết chính xác.')">💰 Bảng giá</button>
        </div>
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" rows="1" placeholder="Nhập tin nhắn..." onkeydown="handleKey(event)"></textarea>
          <button class="btn btn-primary" onclick="sendMessage()">Gửi</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = null, doctorId = null, doctorName = null;
let ws = null;
let cases = {};      // case_id -> case data
let activeCaseId = null;

// ---- Session restore ----
function _saveSession(data) {
  localStorage.setItem('medbot_token', data.token);
  localStorage.setItem('medbot_doctor_id', data.doctor_id);
  localStorage.setItem('medbot_doctor_name', data.name);
  localStorage.setItem('medbot_doctor_specialty', data.specialty);
}

function _clearSession() {
  ['medbot_token','medbot_doctor_id','medbot_doctor_name','medbot_doctor_specialty'].forEach(k => localStorage.removeItem(k));
}

function _applySession(data) {
  token = data.token;
  doctorId = data.doctor_id;
  doctorName = data.name;
  document.getElementById('doctorInfo').textContent = `${data.name} · ${data.specialty}`;
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
}

async function _verifyToken(t) {
  // Verify token is still valid by calling a protected endpoint
  const res = await fetch(`${API}/api/doctor/cases`, {
    headers: { 'Authorization': `Bearer ${t}` }
  });
  return res.ok;
}

async function restoreSession() {
  const t = localStorage.getItem('medbot_token');
  if (!t) return false;
  try {
    const ok = await _verifyToken(t);
    if (!ok) { _clearSession(); return false; }
    _applySession({
      token: t,
      doctor_id: localStorage.getItem('medbot_doctor_id'),
      name: localStorage.getItem('medbot_doctor_name'),
      specialty: localStorage.getItem('medbot_doctor_specialty'),
    });
    return true;
  } catch { _clearSession(); return false; }
}

// ---- Login ----
async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    const res = await fetch(`${API}/api/doctor/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Đăng nhập thất bại');
    _saveSession(data);
    _applySession(data);
    connectWebSocket();
    await loadCases();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function doLogout() {
  _clearSession();
  if (ws) ws.close();
  location.reload();
}

document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Auto-restore session on page load
(async () => {
  const restored = await restoreSession();
  if (restored) {
    connectWebSocket();
    await loadCases();
  }
})();

// ---- WebSocket ----
function connectWebSocket() {
  const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${wsProto}://${location.host}/ws/doctor/${doctorId}`);
  ws.onopen = () => {
    ws.send(JSON.stringify({event:'set_status', status:'online'}));
    updateStatusDot('online');
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    handleServerEvent(msg);
  };
  ws.onclose = () => {
    setTimeout(connectWebSocket, 3000);
  };
}

function handleServerEvent(msg) {
  if (msg.event === 'new_case') {
    const c = msg;
    c._historyLoaded = true; // messages from server already include full history
    if (!c.status) c.status = 'pending';
    cases[c.case_id] = c;
    renderCaseList();
    notify(`📋 Ca mới: ${c.user_id} · ${c.specialty}`);
    if (!activeCaseId) openCase(c.case_id);
  } else if (msg.event === 'user_message') {
    const c = cases[msg.case_id];
    if (c) {
      c.messages = c.messages || [];
      c.messages.push({role:'user', content:msg.content, created_at: new Date().toISOString()});
      if (activeCaseId === msg.case_id) renderChat(msg.case_id);
      else notify(`💬 Tin mới từ ${c.user_id}`);
    }
  } else if (msg.event === 'doctor_message') {
    const c = cases[msg.case_id];
    if (c) {
      c.messages = c.messages || [];
      c.messages.push({role:'doctor', content: msg.content, created_at: new Date().toISOString()});
      if (activeCaseId === msg.case_id) renderChat(msg.case_id);
    }
  } else if (msg.event === 'case_closed') {
    delete cases[msg.case_id];
    renderCaseList();
    if (activeCaseId === msg.case_id) showEmpty();
  } else if (msg.event === 'delegate_rejected') {
    notify('⚠️ ' + msg.content);
  }
}

// ---- Cases ----
async function loadCases() {
  try {
    const res = await fetch(`${API}/api/doctor/cases`, {headers: authHeaders()});
    const data = await res.json();
    for (const c of data.cases) {
      cases[c.id] = {...(cases[c.id]||{}), case_id:c.id, ...c, messages: cases[c.id]?.messages||[]};
    }
    renderCaseList();
  } catch(e) { console.error(e); }
}

function renderCaseList() {
  const el = document.getElementById('casesList');
  const caseArr = Object.values(cases).sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
  if (!caseArr.length) { el.innerHTML = '<div style="padding:16px;font-size:13px;color:#475569">Chưa có ca nào...</div>'; return; }
  el.innerHTML = caseArr.map(c => `
    <div class="case-item ${activeCaseId===c.case_id?'active':''}" onclick="openCase('${c.case_id}')">
      <div class="case-id">${c.case_id.slice(0,8)}...</div>
      <div class="case-user">${c.user_id||c.user_name||'User'}</div>
      <div class="case-meta">
        <span class="badge badge-${c.urgency||'medium'}">${c.urgency||'medium'}</span>
        <span class="badge badge-${c.status||'pending'}" style="margin-left:4px">${{pending:'Chờ nhận',active:'Đang tư vấn',closed:'Đã kết thúc'}[c.status]||c.status||'Chờ nhận'}</span>
        ${c.specialty ? `<span style="margin-left:4px">${c.specialty}</span>` : ''}
      </div>
    </div>
  `).join('');
}

async function openCase(caseId) {
  activeCaseId = caseId;
  renderCaseList();
  const c = cases[caseId];
  if (!c) return;

  document.getElementById('emptyMain').style.display = 'none';
  document.getElementById('chatPanel').style.display = 'flex';
  setTimeout(() => document.getElementById('msgInput').focus(), 50);

  document.getElementById('chatTitle').textContent = c.user_id || c.user_name || 'Bệnh nhân';
  document.getElementById('chatMeta').textContent = `${c.specialty||''} · Urgency: ${c.urgency||'medium'} · ${c.summary||''}`;

  const btnAccept = document.getElementById('btnAccept');
  btnAccept.style.display = (c.status === 'pending') ? 'inline-block' : 'none';

  // Fetch full history (including past sessions) if not yet loaded
  if (!c._historyLoaded) {
    try {
      const res = await fetch(`${API}/api/doctor/cases/${caseId}/history`, {headers: authHeaders()});
      if (res.ok) {
        const data = await res.json();
        c.messages = data.messages;
        c._historyLoaded = true;
      }
    } catch(e) { console.error('History fetch failed', e); }
  }

  renderChat(caseId);

  // Connect to session WS for real-time updates
  if (!c._sessionWs) {
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    c._sessionWs = new WebSocket(`${wsProto}://${location.host}/ws/session/${caseId}`);
  }
}

function showEmpty() {
  activeCaseId = null;
  document.getElementById('chatPanel').style.display = 'none';
  document.getElementById('emptyMain').style.display = 'flex';
}

function renderChat(caseId) {
  const c = cases[caseId];
  if (!c) return;
  const area = document.getElementById('chatArea');
  const msgs = c.messages || [];
  area.innerHTML = msgs.map(m => {
    if (m.role === 'separator') {
      return `<div style="text-align:center;font-size:11px;color:#94a3b8;margin:12px 0;user-select:none">${escHtml(m.content)}</div>`;
    }
    const roleClass = m.role === 'user' ? 'user' : m.role === 'doctor' ? 'doctor' : 'bot';
    const label = m.role === 'user' ? 'Bệnh nhân' : m.role === 'doctor' ? `BS. ${doctorName}` : 'MedBot AI';
    const time = m.created_at ? new Date(m.created_at).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}) : '';
    let bubble = '';
    if (m.file_type === 'image' && m.file_extracted) {
      const src = m.file_extracted.startsWith('data:')
        ? m.file_extracted
        : `${API}/api/telegram/file/${encodeURIComponent(m.file_extracted)}`;
      bubble = `<img src="${src}" alt="ảnh" style="max-width:220px;max-height:220px;border-radius:8px;display:block;margin-bottom:4px" onerror="this.style.display='none'">`;
      if (m.content && m.content !== 'Tôi đã gửi một file.') bubble += escHtml(m.content);
    } else {
      bubble = escHtml(m.content);
    }
    return `<div class="msg ${roleClass}">
      <div class="msg-bubble">${bubble}</div>
      <div class="msg-meta">${label} · ${time}</div>
    </div>`;
  }).join('');
  area.scrollTop = area.scrollHeight;
}

// ---- Send message ----
let _sending = false;
async function sendMessage() {
  if (_sending || !activeCaseId) return;
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;
  _sending = true;
  input.value = '';

  try {
    const res = await fetch(`${API}/api/doctor/send`, {
      method:'POST', headers:{...authHeaders(),'Content-Type':'application/json'},
      body: JSON.stringify({case_id: activeCaseId, content})
    });
    if (!res.ok) throw new Error('Send failed');
    // WS doctor_message event will add the message to UI — no local push needed
  } catch(e) { notify('❌ Không thể gửi tin: ' + e.message); input.value = content; }
  finally { _sending = false; }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ---- Quick replies ----
function qrFill(text) {
  const input = document.getElementById('msgInput');
  input.value = text;
  input.focus();
  input.setSelectionRange(text.length, text.length);
}

async function delegateToBot() {
  if (!activeCaseId) return;
  const btn = document.querySelector('.qr-btn.bot');
  const orig = btn.textContent;
  btn.textContent = '⏳ Đang xử lý...';
  btn.disabled = true;
  try {
    const res = await fetch(`${API}/api/doctor/cases/${activeCaseId}/delegate`, {
      method: 'POST',
      headers: authHeaders(),
    });
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    if (data.ok) {
      notify('🤖 Bot đã trả lời bệnh nhân');
    }
    // delegate_rejected is handled via WebSocket event
  } catch(e) {
    notify('❌ Không thể giao Bot: ' + e.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// ---- Case actions ----
async function acceptCase() {
  if (!activeCaseId) return;
  try {
    const res = await fetch(`${API}/api/doctor/accept`, {
      method: 'POST',
      headers: {...authHeaders(), 'Content-Type': 'application/json'},
      body: JSON.stringify({case_id: activeCaseId}),
    });
    if (!res.ok) throw new Error('Accept failed');
    const c = cases[activeCaseId];
    if (c) { c.status = 'active'; renderCaseList(); renderChat(activeCaseId); }
    document.getElementById('btnAccept').style.display = 'none';
    notify('✅ Đã nhận ca');
  } catch(e) { notify('❌ ' + e.message); }
}

async function closeCase() {
  if (!activeCaseId) return;
  const note = prompt('Ghi chú kết thúc ca (tuỳ chọn):') || '';
  try {
    const res = await fetch(`${API}/api/doctor/close`, {
      method:'POST', headers:{...authHeaders(),'Content-Type':'application/json'},
      body: JSON.stringify({case_id:activeCaseId, close_note:note})
    });
    if (!res.ok) throw new Error('Failed');
    delete cases[activeCaseId];
    renderCaseList();
    showEmpty();
    notify('✅ Ca đã kết thúc');
  } catch(e) { notify('❌ ' + e.message); }
}

async function transferCase() {
  if (!activeCaseId) return;
  const toId = prompt('Nhập doctor_id để chuyển ca:');
  if (!toId) return;
  try {
    const res = await fetch(`${API}/api/doctor/transfer`, {
      method:'POST', headers:{...authHeaders(),'Content-Type':'application/json'},
      body: JSON.stringify({case_id:activeCaseId, to_doctor_id:toId})
    });
    if (!res.ok) throw new Error('Failed');
    delete cases[activeCaseId];
    renderCaseList();
    showEmpty();
    notify('✅ Đã chuyển ca');
  } catch(e) { notify('❌ ' + e.message); }
}

// ---- Status ----
async function updateStatus(status) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({event:'set_status', status}));
  }
  try {
    await fetch(`${API}/api/doctor/status`, {
      method:'POST', headers:{...authHeaders(),'Content-Type':'application/json'},
      body: JSON.stringify({status})
    });
  } catch(e) {}
  updateStatusDot(status);
}

function updateStatusDot(status) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (status === 'online' ? '' : status);
  document.getElementById('statusSelect').value = status;
}

// ---- Helpers ----
function authHeaders() {
  return token ? {'Authorization':`Bearer ${token}`} : {};
}

function notify(msg) {
  const el = document.createElement('div');
  el.className = 'notification';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ---- Tabs ----
function switchTab(tab) {
  const isCases = tab === 'cases';
  document.getElementById('panelCases').style.display = isCases ? 'flex' : 'none';
  document.getElementById('panelAppts').style.display = isCases ? 'none' : 'block';
  document.getElementById('tabCases').style.background = isCases ? '#3b82f6' : '#f8fafc';
  document.getElementById('tabCases').style.color = isCases ? '#fff' : '#64748b';
  document.getElementById('tabAppts').style.background = isCases ? '#f8fafc' : '#3b82f6';
  document.getElementById('tabAppts').style.color = isCases ? '#64748b' : '#fff';
  if (!isCases) loadAppointments();
}

async function loadAppointments() {
  const el = document.getElementById('apptList');
  el.innerHTML = 'Đang tải...';
  try {
    const res = await fetch(`${API}/api/doctor/appointments`, {headers: authHeaders()});
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    const appts = data.appointments || [];
    if (!appts.length) { el.innerHTML = '<div style="color:#94a3b8;padding:8px 0">Chưa có lịch hẹn</div>'; return; }
    el.innerHTML = appts.map(a => {
      const d = new Date(a.appointment_date);
      const dateStr = d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
      const statusColor = {pending:'#f59e0b',confirmed:'#22c55e',cancelled:'#ef4444'}[a.status]||'#94a3b8';
      const statusLabel = {pending:'Chờ xác nhận',confirmed:'Đã xác nhận',cancelled:'Đã huỷ'}[a.status]||a.status;
      return `<div style="border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="font-weight:600">${escHtml(a.patient_name)}</div>
        <div style="font-size:12px;color:#64748b">📅 ${dateStr}</div>
        <div style="font-size:12px;margin-top:4px;display:flex;gap:8px;align-items:center">
          <span style="background:${statusColor};color:#fff;padding:2px 8px;border-radius:10px;font-size:11px">${statusLabel}</span>
          ${a.status==='pending'?`<button onclick="confirmAppt('${a.id}')" style="font-size:11px;padding:2px 8px;border:1px solid #22c55e;color:#22c55e;background:none;border-radius:6px;cursor:pointer">✅ Xác nhận</button>`:''}
          ${a.status==='pending'?`<button onclick="cancelAppt('${a.id}')" style="font-size:11px;padding:2px 8px;border:1px solid #ef4444;color:#ef4444;background:none;border-radius:6px;cursor:pointer">✖ Huỷ</button>`:''}
        </div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = '<div style="color:#ef4444">Không tải được lịch hẹn</div>'; }
}

async function confirmAppt(id) {
  try {
    const res = await fetch(`${API}/api/doctor/appointments/${id}`, {
      method: 'PATCH',
      headers: {...authHeaders(), 'Content-Type': 'application/json'},
      body: JSON.stringify({status:'confirmed'}),
    });
    if (!res.ok) throw new Error('Failed');
    notify('✅ Đã xác nhận lịch hẹn');
    loadAppointments();
  } catch(e) { notify('❌ Lỗi: ' + e.message); }
}

async function cancelAppt(id) {
  if (!confirm('Huỷ lịch hẹn này?')) return;
  try {
    const res = await fetch(`${API}/api/doctor/appointments/${id}`, {
      method: 'PATCH',
      headers: {...authHeaders(), 'Content-Type': 'application/json'},
      body: JSON.stringify({status:'cancelled'}),
    });
    if (!res.ok) throw new Error('Failed');
    notify('✅ Đã huỷ lịch hẹn');
    loadAppointments();
  } catch(e) { notify('❌ Lỗi: ' + e.message); }
}
</script>
