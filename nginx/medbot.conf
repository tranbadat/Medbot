# /etc/nginx/sites-available/medbot
# Symlink to enable: sudo ln -s /path/to/project/nginx/medbot.conf /etc/nginx/sites-enabled/medbot
#
# Sau khi có SSL (certbot):
#   sudo certbot --nginx -d yourdomain.com
# certbot sẽ tự sửa file này thêm SSL block.

server {
    listen 80;
    listen [::]:80;
    server_name medbot.tranbadat.vn;   # ← đổi thành domain thật

    client_max_body_size 25M;

    # Zalo domain verification files
    location ~* ^/zalo_verifier.*\.html$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (doctor dashboard real-time)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
